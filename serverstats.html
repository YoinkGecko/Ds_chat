<!DOCTYPE html>
<html>
<head>
  <title>Load Balancer Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>Server Load (Score)</h2>
<canvas id="chart" width="900" height="450"></canvas>

<h2>Server Status</h2>
<ul id="statusList"></ul>

<script>
const ctx = document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [
      { label: 'Server 5001', data: [], borderWidth: 2 },
      { label: 'Server 5002', data: [], borderWidth: 2 },
      { label: 'Server 5003', data: [], borderWidth: 2 }
    ]
  },
  options: {
    animation: false,
    responsive: true,
    plugins: {
      title: {
        display: true,
        text: 'Server Load Over Time'
      }
    },
    scales: {
      x: {
        title: {
          display: true,
          text: 'Time (mm:ss.ms)'
        }
      },
      y: {
        beginAtZero: true,
        title: {
          display: true,
          text: 'Load Score'
        }
      }
    }
  }
});

function formatTime(ts) {
  const d = new Date(ts);
  return `${d.getMinutes()}:${d.getSeconds()}.${d.getMilliseconds()}`;
}

async function fetchData() {
  try {
    const res = await fetch("http://localhost:4000/stats");
    const data = await res.json();

    const keys = Object.keys(data);
    if (keys.length === 0) return;

    const labels = data[keys[0]].map(point => formatTime(point.time));
    chart.data.labels = labels;

    chart.data.datasets[0].data = data[keys[0]].map(p => p.score);
    chart.data.datasets[1].data = data[keys[1]].map(p => p.score);
    chart.data.datasets[2].data = data[keys[2]].map(p => p.score);

    chart.update();
  } catch (err) {
    console.error("Error fetching data:", err);
  }
}

async function fetchStatus() {
  try {
    const res = await fetch("http://localhost:4000/status");
    const data = await res.json();

    const list = document.getElementById("statusList");
    list.innerHTML = "";

    data.forEach(server => {
      const li = document.createElement("li");
      li.textContent = `${server.url} → ${server.status}`;
      li.style.fontWeight = "bold";
      li.style.color = server.status === "active" ? "green" : "red";
      list.appendChild(li);
    });

  } catch (err) {
    console.error("Error fetching status:", err);
  }
}

setInterval(fetchData, 1000);
setInterval(fetchStatus, 1000);

fetchData();
fetchStatus();
</script>

</body>
</html>
